syntax = "proto2";

option go_package = "github.com/feimumoke/labequipbms/api_idl/apps/bms/pbbms";
package pbbms;

// POST
message SearchBorrowTaskRequest{
  optional string lab_code = 1;
  optional string equip_id = 2;
  optional string operator = 3;
  optional int64  task_status = 4;
}

message SearchBorrowTaskResponse{
  optional int64 total = 1;
  required BorrowTaskInfo list = 2;
}

message BorrowTaskInfo {
  required string task_id = 11;
  required string equip_id = 1;
  repeated string equip_name = 2;
  optional string lab_code = 3;
  optional string lab_name = 4;
  optional int64 borrow_qty = 5;
  optional int64 task_status = 6;
  required string operator = 7;
  optional int64 ctime = 9;

  repeated BorrowTaskInfo log_list = 10;
}


message BorrowTaskLog {
  optional int64 task_status = 1;
  required string operator = 2;
  required string message = 3;
  required string info = 5;
  optional int64 ctime = 4;
}