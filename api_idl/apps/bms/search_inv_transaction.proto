syntax = "proto2";

option go_package = "github.com/feimumoke/labequipbms/api_idl/apps/bms/pbbms";
package pbbms;

// POST
message SearchInvTransactionRequest{
  optional string lab_code = 1;
  optional string equip_id = 2;
  optional string operator = 3;
}

message SearchInvTransactionResponse{
  optional int64 total = 1;
  required InvTransaction list = 2;
}

message InvTransaction {
  required string transaction_id = 1;
  required string sheet_id = 2;
  required string equip_id = 3;
  repeated string equip_name = 4;
  optional string lab_code = 5;
  optional string lab_name = 6;
  optional string operator = 7;
  optional string remark = 8;
  optional int64 avail_qty = 13;
  optional int64 op_qty = 9;
  optional int64 trans_type = 10;
  optional int64 sheet_type = 11;
  optional int64 ctime = 12;
}