syntax = "proto2";

option go_package = "github.com/feimumoke/labequipbms/api_idl/apps/bms/pbbms";
package pbbms;

// POST
message CreateBorrowRequest{
  required string equip_id = 1;
  required string lab_code = 2;
  required string description = 3;
  required int64  borrow_qty = 4;
  repeated string code_list = 5;
  //0 预约 1 直接拿走
  optional int64 borrow_type = 8;
}

message CreateBorrowResponse{
}
