syntax = "proto2";

option go_package = "github.com/feimumoke/labequipbms/api_idl/apps/basic/pbbasic";
package pbbasic;

// POST
message SearchLabRequest{
}

message SearchLabResponse{
  optional int64 total = 1;
  required LabInfo list = 2;
}

message LabInfo {
  optional string lab_code = 1;
  optional string lab_name = 2;
  optional string address = 4;
  optional string description = 5;
  optional string creator = 6;
  optional int64 ctime = 7;
}