syntax = "proto2";

option go_package = "github.com/feimumoke/labequipbms/api_idl/apps/basic/pbbasic";
package pbbasic;

// POST
message SearchEquipRequest{
  repeated int64 category_id_list = 1;
  optional string equip_name = 2;
}

message SearchEquipResponse{
  optional int64 total = 1;
  required EquipInfo list = 2;
}

message EquipInfo {
  optional string equip_id = 1;
  optional string equip_name = 2;
  optional int64 category_id = 3;
  optional string category_name = 4;
  optional string description = 5;
  optional string creator = 6;
  optional int64 ctime = 7;
}