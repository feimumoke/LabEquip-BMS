upstream cubeNodejs {
    server 127.0.0.1:8010;
}

upstream cubeApp {
    server 127.0.0.1:8080;
}

server {
    listen       80;
    server_name www.worldcube.com;

    #if ($host != 'www.imofa.net' ) { 
    #    rewrite ^/(.*)$ http://www.imofa.net/$1 permanent; 
    #} 

    access_log /usr/local/nginx/logs/cube.access.log;
    error_log /usr/local/nginx/logs/cube.error.log;

    #root         /root/nowamagic_venv/nowamagic_pj;

    location / {
        proxy_pass  http://cubeNodejs;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    location /api {
        proxy_pass  http://cubeApp;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    location /upload {
        root /data/web/up;
        expires 365d;
    }

    location ~ ^(?!\/upload\/).+\.(gif|jpg|jpeg|bmp|png|swf|ico|txt|js|css|eot|ttf|svg|woff|apk|jar|zip)$
    {
        root /data/web/static;
        expires 365d;
    }
}
