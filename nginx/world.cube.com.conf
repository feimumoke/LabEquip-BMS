upstream cubeNodejs {
    server 127.0.0.1:8010;
}

upstream cubeStaticServ {
    server 127.0.0.1:8011;
}

upstream cubeApi {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    server_name world.cube.com;

    access_log /usr/local/etc/nginx/logs/cube.access.log;
    error_log /usr/local/etc/nginx/logs/cube.error.log;

    rewrite ^(.*) https://$server_name$1 permanent;
}

server {
    listen       443;
    server_name world.cube.com;

    #if ($host != 'www.imofa.net' ) { 
    #    rewrite ^/(.*)$ http://www.imofa.net/$1 permanent; 
    #} 

    access_log /usr/local/etc/nginx/logs/cube.access.log;
    error_log /usr/local/etc/nginx/logs/cube.error.log;

    ssl on;
    ssl_certificate /usr/local/etc/nginx/cert/cube/server.crt;
    ssl_certificate_key /usr/local/etc/nginx/cert/cube/server.key;

    #root         /root/nowamagic_venv/nowamagic_pj;

    location / {
        proxy_pass  http://cubeNodejs;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    location /api {
        proxy_pass  http://cubeApp;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    location ~ .*\.(gif|jpg|jpeg|bmp|png|ico|txt|js|css|eot|ttf|svg|woff|apk|jar|zip)$
    {
        proxy_pass  http://cubeStaticServ;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    location /ueditor {
        proxy_pass  http://cubeStaticServ;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    location ~ .*(__webpack_hmr)$
    {
        proxy_pass  http://cubeStaticServ;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }
}

