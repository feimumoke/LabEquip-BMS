# 前端服务 (React)
upstream bmsFrontend {
    server 127.0.0.1:3000;
}

# 后端API服务 (Go)
upstream bmsBackend {
    server 127.0.0.1:8080;
}

# 图片/文件服务
upstream bmsFileServer {
    server 127.0.0.1:8081;
}

server {
    listen 80;
    server_name www.bms.com;

    access_log /usr/local/etc/nginx/logs/bms.access.log;
    error_log /usr/local/etc/nginx/logs/bms.error.log;

    # 后端API接口
    location /api {
        proxy_pass  http://bmsBackend;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # 文件上传/下载服务
    location /upload {
        proxy_pass  http://bmsFileServer;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # 图片、视频等静态文件
    location ~ .*\.(gif|jpg|jpeg|png|bmp|ico|mp4|avi|mov|wmv|flv|webm|pdf|doc|docx|xls|xlsx)$ {
        proxy_pass  http://bmsFileServer;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # 前端静态资源和所有其他请求
    location / {
        proxy_pass  http://bmsFrontend;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
    }
}

