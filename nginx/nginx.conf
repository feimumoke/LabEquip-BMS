user nobody;
worker_processes 1;

error_log /usr/local/etc/nginx/logs/error.log;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /usr/local/etc/nginx/logs/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # 前端服务 (React)
    upstream bmsFrontend {
        server 127.0.0.1:3000;
    }

    # 后端API服务 (Go)
    upstream bmsBackend {
        server 127.0.0.1:8080;
    }

    server {
        listen 80;
        server_name www.equipbms.com www.bms.com;

        # 设置项目根目录
        set $project_root /Users/hui.zhu/WorkSpace/LabEquip-BMS;

        access_log /usr/local/etc/nginx/logs/bms.access.log;
        error_log /usr/local/etc/nginx/logs/bms.error.log;

        # 静态文件目录 - uploads 目录
        location /uploads/ {
            alias $project_root/uploads/;
            autoindex off;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # 静态文件目录 - upload 目录
        location /upload/ {
            alias $project_root/upload/;
            autoindex off;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # 后端API接口
        location /api {
            proxy_pass  http://bmsBackend;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # 前端静态资源和所有其他请求
        location / {
            proxy_pass  http://bmsFrontend;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   Upgrade          $http_upgrade;
            proxy_set_header   Connection       "upgrade";
        }
    }
}
