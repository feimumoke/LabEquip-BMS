version: '3.8'

services:
  # MySQL 数据库服务
  mysql:
    image: mysql:8.0
    container_name: bms-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: bms_basic_db
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database_schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - bms-network
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  # 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bms-backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./uploads:/root/uploads
      - ./server/_config:/root/server/_config
    networks:
      - bms-network
    # 等待 MySQL 启动
    command: >
      sh -c "sleep 10 && ./bms-api"

  # Nginx 反向代理服务
  nginx:
    image: nginx:alpine
    container_name: bms-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/www.bms.com.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/build:/usr/share/nginx/html:ro
      - ./uploads:/usr/share/nginx/uploads:ro
    depends_on:
      - backend
    networks:
      - bms-network

# 数据卷
volumes:
  mysql-data:
    driver: local

# 网络
networks:
  bms-network:
    driver: bridge
